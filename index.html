<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PS2 Cloud Console</title>
    <script src="https://purei.org/play/play.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="top-bar">
        <div class="user-profile focusable" onclick="openModal('profile-modal')">
            <img src="pfp/default.png" alt="Profile" id="current-pfp" onerror="this.src='https://via.placeholder.com/40/333/fff?text=P1'">
            <span id="player-name">Player 1</span>
        </div>
        <div class="system-info">
            <span id="clock">12:00 PM</span>
            <i class="fas fa-wifi"></i>
            <i class="fas fa-battery-full"></i>
        </div>
    </header>

    <main class="stage">
        <h1 id="game-title-display">Select Software</h1>
        
        <div id="download-container" class="hidden">
            <p id="download-status">Preparing System...</p>
            <div class="progress-bar-bg">
                <div id="download-bar" class="progress-bar-fill"></div>
            </div>
        </div>

        <div class="carousel-container">
            <div id="game-strip"></div>
        </div>
    </main>

    <footer class="bottom-bar">
        <div class="tool-icon focusable" onclick="openModal('news-modal')">
            <i class="fas fa-newspaper"></i>
            <span>News</span>
        </div>
        <div class="tool-icon focusable">
            <i class="fas fa-gamepad"></i>
            <span>Controllers</span>
        </div>
        <div class="tool-icon focusable">
            <i class="fas fa-cog"></i>
            <span>Settings</span>
        </div>
        <div class="tool-icon focusable" onclick="openModal('power-modal')">
            <i class="fas fa-power-off"></i>
            <span>Power</span>
        </div>
    </footer>

    <div id="profile-modal" class="overlay hidden">
        <div class="modal-box">
            <h2>Select Profile Icon</h2>
            <div class="pfp-grid" id="pfp-grid">
                </div>
            <button class="close-btn focusable" onclick="closeModal('profile-modal')">Back</button>
        </div>
    </div>

    <div id="news-modal" class="overlay hidden">
        <div class="modal-box large-modal">
            <h2>Gaming Pulse</h2>
            <p>Stay tuned for the latest PS2 updates!</p>
            <button class="close-btn focusable" onclick="closeModal('news-modal')">Back</button>
        </div>
    </div>

    <div id="power-modal" class="overlay hidden">
        <div class="modal-box">
            <h2>Power Options</h2>
            <button class="power-btn focusable" style="color: #ff4444;" onclick="window.close()">Turn Off Console</button>
            <button class="close-btn focusable" onclick="closeModal('power-modal')">Back</button>
        </div>
    </div>

    <div id="game-player" class="overlay hidden" style="background: #000; flex-direction: column;">
        <div id="loading-screen" style="text-align: center; color: white;">
            <div class="loader"></div>
            <p id="boot-text">Initialising System...</p>
        </div>
        <canvas id="emulator-canvas" class="hidden"></canvas>
        <div class="game-controls">
            <button class="focusable close-btn" onclick="closeGame()">Close Game</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
