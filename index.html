<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PS2 Cloud Console</title>
    <script src="https://purei.org/play/play.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="ui-layer">
        <header class="top-bar">
            <div class="user-profile">
                <img src="https://via.placeholder.com/40/333/fff?text=P1" alt="Profile" id="current-pfp">
                <span>Player 1</span>
            </div>
            <div class="system-info">
                <span id="clock">12:00 PM</span>
                <i class="fas fa-wifi"></i>
                <i class="fas fa-battery-full"></i>
            </div>
        </header>

        <main class="stage">
            <h1 id="game-title-display">Select Software</h1>
            
            <div class="carousel-container">
                <div id="game-strip"></div>
            </div>
        </main>

        <footer class="bottom-bar">
            <div class="tool-icon"><i class="fas fa-newspaper"></i><span>News</span></div>
            <div class="tool-icon"><i class="fas fa-gamepad"></i><span>Controllers</span></div>
            <div class="tool-icon"><i class="fas fa-cog"></i><span>Settings</span></div>
            <div class="tool-icon" onclick="window.close()"><i class="fas fa-power-off"></i><span>Power</span></div>
        </footer>
    </div>

    <div id="download-modal" class="overlay hidden">
        <div class="switch-box">
            <h2 id="dl-title">Downloading data...</h2>
            <p class="dl-subtitle">Download will pause if the software being played uses communication features or when other software is downloaded.</p>
            
            <div class="switch-progress-container">
                <i class="fas fa-spinner fa-spin spinner-icon"></i>
                <div class="switch-bar-bg">
                    <div id="switch-bar-fill" class="switch-bar-fill"></div>
                </div>
                <span id="switch-percent">0%</span>
            </div>

            <div id="dl-status-text" style="color: #666; font-size: 0.8rem; margin-bottom: 20px;">Initializing...</div>

            <button class="switch-btn">Download Options</button>
            <div class="switch-close" onclick="cancelDownload()">Close</div>
        </div>
    </div>

    <div id="emulator-layer" class="hidden">
        <canvas id="emulator-canvas"></canvas>
        <button id="exit-game-btn" onclick="exitGame()"><i class="fas fa-times"></i> Exit Game</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
